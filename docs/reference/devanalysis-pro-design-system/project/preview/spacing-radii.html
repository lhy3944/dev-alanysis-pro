<!doctype html>
<!-- @dsCard group="Spacing" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 20px; font-family: var(--font-sans); }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .shape {
        height: 64px;
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
    }
    .row { text-align: center; }
    .name { font-size: 11px; color: var(--text-primary); font-weight: 500; margin-top: 8px; }
    .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; font-weight: 600; }
</style>
</head>
<body>
    <div class="label">Corner radii</div>
    <div class="grid">
        <div class="row"><div class="shape" style="border-radius:4px"></div><div class="name">sm</div><div class="px">4px · chips</div></div>
        <div class="row"><div class="shape" style="border-radius:6px"></div><div class="name">md</div><div class="px">6px · buttons</div></div>
        <div class="row"><div class="shape" style="border-radius:8px"></div><div class="name">lg</div><div class="px">8px · cards (default)</div></div>
        <div class="row"><div class="shape" style="border-radius:12px"></div><div class="name">xl</div><div class="px">12px · modals</div></div>
        <div class="row"><div class="shape" style="border-radius:9999px"></div><div class="name">full</div><div class="px">∞ · pills</div></div>
    </div>
</body>
</html>
