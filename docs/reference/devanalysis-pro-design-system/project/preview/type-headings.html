<!doctype html>
<!-- @dsCard group="Type" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type scale — display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 20px; font-family: var(--font-sans); color: var(--text-primary); }
    .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; }
    .row + .row { border-top: 1px dashed var(--border-subtle); }
    .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 130px; flex-shrink: 0; }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; font-weight: 600; }
</style>
</head>
<body>
    <div class="label">Headings · Pretendard</div>
    <div class="row">
        <span class="meta">--text-3xl · 28/700</span>
        <span style="font-size:28px;font-weight:700;letter-spacing:-0.01em">변경 영향 분석 결과</span>
    </div>
    <div class="row">
        <span class="meta">--text-2xl · 22/700</span>
        <span style="font-size:22px;font-weight:700;letter-spacing:-0.01em">System Monitoring</span>
    </div>
    <div class="row">
        <span class="meta">--text-xl · 19/600</span>
        <span style="font-size:19px;font-weight:600">User Management</span>
    </div>
    <div class="row">
        <span class="meta">--text-lg · 17/600</span>
        <span style="font-size:17px;font-weight:600">Currently Analyzing Projects</span>
    </div>
</body>
</html>
