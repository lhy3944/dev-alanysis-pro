<!doctype html>
<!-- @dsCard group="Components" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { font-family: var(--font-sans); padding: 20px; }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; font-weight: 600; }

    /* Underline tabs (Admin top tabs) */
    .ut { display: flex; gap: 24px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 20px; padding-bottom: 0; }
    .ut a { padding: 10px 4px; font-size: 13px; color: var(--text-muted); font-weight: 500; text-decoration: none; position: relative; cursor: pointer; }
    .ut a.active { color: #5569FF; }
    .ut a.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: #5569FF; border-radius: 2px; }

    /* Pill / chip tabs */
    .pt { display: inline-flex; gap: 2px; padding: 3px; background: var(--bg-secondary); border-radius: 8px; }
    .pt a { padding: 6px 12px; font-size: 12px; color: var(--text-muted); font-weight: 500; border-radius: 6px; cursor: pointer; }
    .pt a.active { background: #fff; color: var(--text-primary); box-shadow: 0 1px 2px 0 rgba(0,0,0,0.06); }
</style>
</head>
<body>
    <div class="label">Underline tabs · pages with sub-views</div>
    <div class="ut">
        <a class="active">Usage Overview</a>
        <a>System Status</a>
        <a>User Management</a>
    </div>
    <div class="label">Segmented · view toggle / filter</div>
    <div class="pt">
        <a class="active">Card</a>
        <a>List</a>
    </div>
    &nbsp;&nbsp;
    <div class="pt">
        <a class="active">All</a>
        <a>Java</a>
        <a>C/C++</a>
        <a>Python</a>
    </div>
</body>
</html>
