<!doctype html>
<!-- @dsCard group="Colors" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 20px; font-family: var(--font-sans); }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .card {
        border-radius: 6px;
        border: 1px solid var(--border-subtle);
        overflow: hidden;
    }
    .chip {
        height: 56px;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 600; color: #fff;
    }
    .meta {
        padding: 8px 12px;
        font-size: 10px; color: var(--text-muted);
        line-height: 1.4;
    }
    .meta b { display: block; color: var(--text-primary); font-weight: 600; font-size: 11px; font-family: var(--font-mono); }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
</style>
</head>
<body>
    <div class="label">Semantic · used for buttons, status dots, alerts</div>
    <div class="grid">
        <div class="card"><div class="chip" style="background:#1aae39">Success</div><div class="meta"><b>#1AAE39</b>--success</div></div>
        <div class="card"><div class="chip" style="background:#dd5b00">Warning</div><div class="meta"><b>#DD5B00</b>--warning</div></div>
        <div class="card"><div class="chip" style="background:#e03131">Destructive</div><div class="meta"><b>#E03131</b>--destructive</div></div>
        <div class="card"><div class="chip" style="background:#2563eb">Info</div><div class="meta"><b>#2563EB</b>--info</div></div>
    </div>
</body>
</html>
