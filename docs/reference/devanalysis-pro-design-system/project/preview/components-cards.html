<!doctype html>
<!-- @dsCard group="Components" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card patterns</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-secondary); }
    body { padding: 18px; font-family: var(--font-sans); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .card { background: #fff; border: 1px solid var(--border-subtle); border-radius: 8px; padding: 18px; }
    .card-hover { box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.4); }

    .head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .head .tile {
        width: 32px; height: 32px;
        background: rgba(85,105,255,0.1); color: #5569FF;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
    }
    .head h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .desc { font-size: 13px; line-height: 1.5; color: var(--text-secondary); margin: 0 0 14px; }
    .foot {
        border-top: 1px dotted var(--border-subtle);
        padding-top: 10px;
        margin-top: 6px;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 11px; color: var(--text-muted);
    }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 9999px; background: #d1fae5; color: #047857; font-size: 10px; font-weight: 600; }
    .meta-icons { display: flex; gap: 12px; align-items: center; }
    .meta-icons span { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
    .meta-icons b { color: var(--text-secondary); font-weight: 600; }
    svg { width: 14px; height: 14px; }
    .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; font-weight: 600; }
</style>
</head>
<body>
    <div class="label">Card · rest &nbsp;·&nbsp; Card · hover</div>
    <div class="grid">
        <div class="card">
            <div class="head">
                <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
                <div><h3>SAVE-Web</h3><span style="font-size:10px;color:var(--text-muted)">JavaScript/TypeScript</span></div>
            </div>
            <p class="desc">Main web application for SAVE platform. Last measured 2025-05-10.</p>
            <div class="foot">
                <span class="pill">● Published</span>
                <div class="meta-icons">
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><b>12</b></span>
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><b>3d ago</b></span>
                </div>
            </div>
        </div>
        <div class="card card-hover">
            <div class="head">
                <div class="tile" style="background:rgba(217,119,6,0.1);color:#d97706"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2h4l4 4v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6l4-4z"/><path d="M14 2v4h4"/></svg></div>
                <div><h3>SAVE-Mobile</h3><span style="font-size:10px;color:var(--text-muted)">Objective-C/C++</span></div>
            </div>
            <p class="desc">iOS mobile client for SAVE. Last measured 2025-04-28.</p>
            <div class="foot">
                <span class="pill" style="background:#fef3c7;color:#b45309">● Draft</span>
                <div class="meta-icons">
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><b>5</b></span>
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><b>1w ago</b></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
