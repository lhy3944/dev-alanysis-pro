<!doctype html>
<!-- @dsCard group="Brand" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Header chrome</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-secondary); }
    body { font-family: var(--font-sans); padding: 16px 18px; }
    .label {
        font-size: 11px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.12em;
        margin: 0 0 8px; font-weight: 600;
        display: flex; gap: 8px; align-items: center;
    }
    .label .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-primary); background: var(--bg-surface-2); padding: 1px 6px; border-radius: 4px; }
    .label + .stack { margin-bottom: 18px; }
    .stack { display: block; }

    .header {
        height: 60px;
        background: #5569FFF2;
        backdrop-filter: blur(20px);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 18px;
        color: #fff;
        overflow: hidden;
    }

    .left { display: flex; align-items: center; gap: 10px; }

    .hamburger {
        width: 32px; height: 32px;
        display: inline-flex; align-items: center; justify-content: center;
        border-radius: 6px;
        color: rgba(255,255,255,0.9);
    }
    .hamburger:hover { background: rgba(255,255,255,0.12); }

    .lockup {
        display: inline-flex; align-items: center; gap: 8px;
        font-weight: 700; font-size: 17px; letter-spacing: -0.02em;
        color: #fff;
    }
    .lockup .mark {
        width: 30px; height: 30px; border-radius: 7px;
        background: rgba(255,255,255,0.18); color: #fff;
        display: inline-flex; align-items: center; justify-content: center;
    }
    .lockup .word { display: inline-flex; align-items: baseline; gap: 6px; }
    .lockup .word .pro { font-weight: 500; color: rgba(255,255,255,0.7); }

    .right { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .tab { padding: 7px 12px; border-radius: 4px; color: rgba(255,255,255,0.7); font-weight: 500; cursor: default; white-space: nowrap; }
    .tab.active { background: rgba(255,255,255,0.18); color: #fff; }
    .sep { width: 1px; height: 22px; background: rgba(255,255,255,0.18); margin: 0 6px; }

    .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: rgba(255,255,255,0.85); }
    .icon-btn:hover { background: rgba(255,255,255,0.12); }
    .dot { position: relative; }
    .dot::after { content: ""; position: absolute; top: 6px; right: 7px; width: 7px; height: 7px; background: #ff5252; border-radius: 9999px; }

    svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .lockup svg { stroke-width: 2.6; }

    .avatar { width: 28px; height: 28px; border-radius: 9999px; background: linear-gradient(180deg, #94a3b8, #475569); margin-left: 4px; border: 2px solid rgba(255,255,255,0.4); }

    /* Desktop / mobile state visibility tied to a class — these preview states
       are shown stacked, not media-query driven, so the card reads as a spec. */
    .state-desktop .hamburger { display: none; }
    .state-desktop .nav-mobile { display: none; }

    .state-mobile .nav-tabs { display: none; }
    .state-mobile .icon-btn.search-icon { display: none; }
    .state-mobile .sep.tab-sep { display: none; }
</style>
</head>
<body>

    <div class="label"><span class="px">≥ md · 1280–768</span><span>Desktop · full tab bar</span></div>
    <div class="stack">
        <div class="header state-desktop">
            <div class="left">
                <span class="lockup">
                    <span class="mark"><svg viewBox="0 0 24 24"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                    <span class="word">DevAnalysis<span class="pro">Pro</span></span>
                </span>
            </div>
            <div class="right">
                <span class="nav-tabs" style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;">
                    <span class="tab">My Projects</span>
                    <span class="tab active">Project Groups</span>
                    <span class="tab">Admin</span>
                    <span class="tab">Help</span>
                </span>
                <span class="sep tab-sep"></span>
                <span class="icon-btn search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                <span class="icon-btn dot"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                <span class="avatar"></span>
            </div>
        </div>
    </div>

    <div class="label"><span class="px">&lt; md · ≤ 767</span><span>Mobile · tabs hide · hamburger left of logo</span></div>
    <div class="stack" style="max-width:420px">
        <div class="header state-mobile">
            <div class="left">
                <span class="hamburger"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span>
                <span class="lockup">
                    <span class="mark"><svg viewBox="0 0 24 24"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                    <span class="word">DevAnalysis<span class="pro">Pro</span></span>
                </span>
            </div>
            <div class="right">
                <span class="icon-btn dot"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                <span class="avatar"></span>
            </div>
        </div>
    </div>

</body>
</html>
