<!doctype html>
<!-- @dsCard group="Colors" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutral surfaces — dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; }
    html { background: #0a0a0a; }
    body { padding: 20px; font-family: var(--font-sans); background: #0a0a0a; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .sw { border-radius: 6px; border: 1px solid #2a2a2a; overflow: hidden; }
    .swatch-chip { height: 56px; }
    .meta {
        padding: 8px 10px;
        font-size: 10px; color: #8e8e8e;
        background: #0a0a0a;
        line-height: 1.4;
    }
    .meta b { display: block; color: #ffffffde; font-weight: 600; font-size: 11px; font-family: var(--font-mono); }
    .label { font-size: 11px; color: #8e8e8e; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
</style>
</head>
<body>
    <div class="label">Neutral surfaces · dark theme</div>
    <div class="grid">
        <div class="sw"><div class="swatch-chip" style="background:#0A0A0A;border-right:1px solid #2a2a2a;border-bottom:1px solid #2a2a2a"></div><div class="meta"><b>#0A0A0A</b>bg-primary</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#141414"></div><div class="meta"><b>#141414</b>bg-secondary</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#242424"></div><div class="meta"><b>#242424</b>bg-surface-2</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#2E2E2E"></div><div class="meta"><b>#2E2E2E</b>bg-surface-3</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#1E1E1E"></div><div class="meta"><b>#1E1E1E</b>bg-input</div></div>
    </div>
</body>
</html>
