<!doctype html>
<!-- @dsCard group="Brand" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo / wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 18px 20px; font-family: var(--font-sans); }

    .reco {
        font-size: 11px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.12em;
        font-weight: 600; margin-bottom: 12px;
    }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .swatch {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px;
        padding: 22px 16px;
        border-radius: 6px;
        min-height: 138px;
    }
    .light { background: #fff; border: 1px solid var(--border-subtle); }
    .brand { background: #5569FFF2; }
    .dark  { background: #0a0a0a; }

    .tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase;
    }
    .light .tag { color: var(--text-muted); }
    .brand .tag, .dark .tag { color: rgba(255,255,255,0.6); }

    /* Lockup */
    .lockup {
        display: inline-flex; align-items: center; gap: 8px;
        font-weight: 700; letter-spacing: -0.02em;
    }
    .lockup .word { display: inline-flex; align-items: baseline; gap: 6px; }
    .lockup .word .pro { font-weight: 500; opacity: 0.7; }

    .lockup.lg     { font-size: 22px; }
    .lockup.lg .mark { width: 36px; height: 36px; border-radius: 8px; }
    .lockup.lg svg { width: 20px; height: 20px; }

    .lockup.md     { font-size: 15px; }
    .lockup.md .mark { width: 26px; height: 26px; border-radius: 6px; }
    .lockup.md svg { width: 14px; height: 14px; }

    .mark {
        display: inline-flex; align-items: center; justify-content: center;
    }
    .light .mark { background: rgba(85,105,255,0.12); color: #5569FF; }
    .brand .mark { background: rgba(255,255,255,0.18); color: #fff; }
    .dark  .mark { background: rgba(85,105,255,0.22); color: #6f80ff; }

    .light .lockup, .light .word { color: var(--text-primary); }
    .brand .lockup, .brand .word { color: #fff; }
    .dark  .lockup, .dark  .word { color: #fff; }

    /* Standalone mark */
    .markonly {
        display: inline-flex; align-items: center; justify-content: center;
        border-radius: 8px;
        width: 44px; height: 44px;
    }
    .markonly svg { width: 22px; height: 22px; }
    .light .markonly { background: #5569FF; color: #fff; }
    .brand .markonly { background: #fff; color: #5569FF; }
    .dark  .markonly { background: #5569FF; color: #fff; }
</style>
</head>
<body>
    <div class="reco">Locked: option B · code-bracket mark + wordmark</div>
    <div class="grid">

        <div class="swatch light">
            <span class="lockup lg">
                <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                <span class="word">DevAnalysis<span class="pro">Pro</span></span>
            </span>
            <span class="lockup md">
                <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                <span class="word">DevAnalysis<span class="pro">Pro</span></span>
            </span>
            <span class="tag">on light</span>
        </div>

        <div class="swatch brand">
            <span class="lockup lg">
                <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                <span class="word">DevAnalysis<span class="pro">Pro</span></span>
            </span>
            <span class="markonly"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
            <span class="tag">on brand · standalone mark</span>
        </div>

        <div class="swatch dark">
            <span class="lockup lg">
                <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                <span class="word">DevAnalysis<span class="pro">Pro</span></span>
            </span>
            <span class="lockup md">
                <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 3 12 8 18"/><polyline points="16 6 21 12 16 18"/></svg></span>
                <span class="word">DevAnalysis<span class="pro">Pro</span></span>
            </span>
            <span class="tag">on dark</span>
        </div>

    </div>
</body>
</html>
