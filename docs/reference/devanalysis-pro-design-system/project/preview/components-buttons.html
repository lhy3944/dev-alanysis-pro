<!doctype html>
<!-- @dsCard group="Components" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 20px; font-family: var(--font-sans); }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; font-weight: 600; }
    button {
        font-family: inherit;
        display: inline-flex; align-items: center; justify-content: center;
        gap: 8px;
        height: 36px;
        padding: 0 16px;
        border-radius: 6px;
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }
    .b-default { background: #000; color: #fff; }
    .b-default:hover { background: #1a1a1a; }
    .b-brand { background: #5569FF; color: #fff; }
    .b-brand:hover { background: #4356E6; }
    .b-outline { background: #fff; color: #171717; border-color: var(--border-primary); box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
    .b-outline:hover { background: var(--bg-secondary); }
    .b-secondary { background: var(--bg-secondary); color: #171717; }
    .b-secondary:hover { background: var(--bg-surface-2); }
    .b-ghost { background: transparent; color: #4a4c52; }
    .b-ghost:hover { background: var(--bg-secondary); color: #171717; }
    .b-destructive { background: #e03131; color: #fff; }
    .b-destructive:hover { background: #c2185b; }
    .b-sm { height: 32px; padding: 0 12px; font-size: 13px; }
    .b-xs { height: 24px; padding: 0 8px; font-size: 11px; gap: 4px; }
    svg { width: 14px; height: 14px; }
</style>
</head>
<body>
    <div class="label">Variants</div>
    <div class="row">
        <button class="b-default">Default</button>
        <button class="b-brand">Brand primary</button>
        <button class="b-outline">Outline</button>
        <button class="b-secondary">Secondary</button>
        <button class="b-ghost">Ghost</button>
        <button class="b-destructive">Delete</button>
    </div>
    <div class="label">Sizes · with icon</div>
    <div class="row">
        <button class="b-default b-xs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>xs</button>
        <button class="b-default b-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
        <button class="b-default"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>Default</button>
        <button class="b-outline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export Markdown</button>
        <button class="b-brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share Report</button>
    </div>
</body>
</html>
