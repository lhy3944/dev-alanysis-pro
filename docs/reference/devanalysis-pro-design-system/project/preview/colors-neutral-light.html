<!doctype html>
<!-- @dsCard group="Colors" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutral surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-primary); }
    body { padding: 20px; font-family: var(--font-sans); }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .sw {
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        overflow: hidden;
    }
    .swatch-chip { height: 56px; }
    .meta {
        padding: 8px 10px;
        font-size: 10px; color: var(--text-muted);
        background: var(--bg-primary);
        line-height: 1.4;
    }
    .meta b { display: block; color: var(--text-primary); font-weight: 600; font-size: 11px; font-family: var(--font-mono); }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
</style>
</head>
<body>
    <div class="label">Neutral surfaces · light theme</div>
    <div class="grid">
        <div class="sw"><div class="swatch-chip" style="background:#FFFFFF;border-right:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle)"></div><div class="meta"><b>#FFFFFF</b>bg-primary</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#F5F5F7"></div><div class="meta"><b>#F5F5F7</b>bg-secondary</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#E8E9ED"></div><div class="meta"><b>#E8E9ED</b>bg-surface-2</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#DCDEE2"></div><div class="meta"><b>#DCDEE2</b>bg-surface-3</div></div>
        <div class="sw"><div class="swatch-chip" style="background:#F0F0F3"></div><div class="meta"><b>#F0F0F3</b>bg-input</div></div>
    </div>
</body>
</html>
